version: 2

models:
  - name: int_nfl__game_results
    description: >
      Games unpivoted to one row per team per game, with result (W/L/T), points
      for/against, and point differential from that team's perspective.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [game_id, team_id]
    columns:
      - name: result
        data_tests:
          - accepted_values:
              arguments:
                values: ["W", "L", "T"]

  - name: int_golf__player_tournament_scoring
    description: >
      Per player per tournament scoring rollup (rounds played, total strokes,
      cumulative score to par) joined to the finishing position.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [tournament_id, player_id]
    columns:
      - name: rounds_played
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 4
