version: 2

models:
  - name: dim_golf_players
    description: "Golfer dimension."
    columns:
      - name: player_id
        data_tests: [unique, not_null]

  - name: dim_golf_courses
    description: "Course dimension."
    columns:
      - name: course_id
        data_tests: [unique, not_null]

  - name: fct_golf_rounds
    description: "Round fact with score-to-par and per-round GIR / fairway rates."
    columns:
      - name: round_id
        data_tests: [unique, not_null]
      - name: gir_pct
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: fairway_pct
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100

  - name: mart_golf_player_scoring_summary
    description: >
      Player scoring profile across all rounds: scoring average, average score
      to par, putts per round, GIR% and fairway%. Ranked by scoring average.
    columns:
      - name: player_id
        data_tests: [unique, not_null]
      - name: scoring_rank
        data_tests: [unique, not_null]
      - name: rounds_played
        data_tests: [not_null]
