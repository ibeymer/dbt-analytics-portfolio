version: 2

models:
  - name: dim_golf_players
    description: "Golfer dimension (ESPN)."
    columns:
      - name: player_id
        data_tests: [unique, not_null]

  - name: dim_golf_tournaments
    description: "Tournament dimension (ESPN)."
    columns:
      - name: tournament_id
        data_tests: [unique, not_null]

  - name: fct_golf_rounds
    description: "Round fact: one row per player per round, with strokes and score to par."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [tournament_id, player_id, round_number]

  - name: mart_golf_player_scoring_summary
    description: >
      Player scoring profile across all tournaments: scoring average, average
      score to par, cuts made and best finish. Ranked by scoring average
      (min 4 rounds).
    columns:
      - name: player_id
        data_tests: [unique, not_null]
      - name: scoring_rank
        data_tests: [unique, not_null]
