version: 2

seeds:
  - name: raw_golf_players
    description: "Raw golfer roster (synthetic). One row per player."
    columns:
      - name: player_id
        data_tests: [unique, not_null]
      - name: handedness
        data_tests:
          - accepted_values:
              values: ["R", "L"]

  - name: raw_golf_courses
    description: "Raw course catalog (synthetic). One row per course."
    columns:
      - name: course_id
        data_tests: [unique, not_null]
      - name: par
        data_tests: [not_null]

  - name: raw_golf_rounds
    description: "Raw scorecards at the round grain (synthetic)."
    columns:
      - name: round_id
        data_tests: [unique, not_null]
      - name: player_id
        data_tests:
          - relationships:
              to: ref('raw_golf_players')
              field: player_id
      - name: course_id
        data_tests:
          - relationships:
              to: ref('raw_golf_courses')
              field: course_id

  - name: raw_golf_hole_scores
    description: "Raw hole-by-hole scoring (synthetic). 18 rows per round."
    columns:
      - name: score_id
        data_tests: [unique, not_null]
      - name: round_id
        data_tests:
          - relationships:
              to: ref('raw_golf_rounds')
              field: round_id
