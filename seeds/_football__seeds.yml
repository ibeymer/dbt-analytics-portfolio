version: 2

seeds:
  - name: raw_football_teams
    description: "Raw football clubs (synthetic). One row per team."
    columns:
      - name: team_id
        description: "Surrogate primary key for a team."
        data_tests: [unique, not_null]
      - name: team_name
        data_tests: [not_null]

  - name: raw_football_players
    description: "Raw squad lists (synthetic). One row per player."
    columns:
      - name: player_id
        data_tests: [unique, not_null]
      - name: team_id
        description: "FK to raw_football_teams."
        data_tests:
          - not_null
          - relationships:
              to: ref('raw_football_teams')
              field: team_id
      - name: position
        data_tests:
          - accepted_values:
              values: ["GK", "DF", "MF", "FW"]

  - name: raw_football_matches
    description: "Raw match results (synthetic). One row per fixture."
    columns:
      - name: match_id
        data_tests: [unique, not_null]
      - name: home_team_id
        data_tests:
          - relationships:
              to: ref('raw_football_teams')
              field: team_id
      - name: away_team_id
        data_tests:
          - relationships:
              to: ref('raw_football_teams')
              field: team_id

  - name: raw_football_player_match_stats
    description: "Raw per-player, per-match box-score stats (synthetic)."
    columns:
      - name: stat_id
        data_tests: [unique, not_null]
      - name: match_id
        data_tests:
          - relationships:
              to: ref('raw_football_matches')
              field: match_id
      - name: player_id
        data_tests:
          - relationships:
              to: ref('raw_football_players')
              field: player_id
